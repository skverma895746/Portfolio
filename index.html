<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to my portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/index.css">
</head>

<body>
    <div class="loader" aria-label="Loading portfolio">
        <div class="spinCon">
            <div class="spiner"></div>
        </div>
    </div>

    <main class="container">
        <div class="greet">
            <p>Portfolio Gateway</p>
            <h2><!-- greeting word here --></h2>
        </div>

        <div class="welcome">
            <h1>Welcome to my portfolio</h1>
        </div>

        <div class="button-group">
            <button class="btn btn-secondary" type="button" onclick="window.history.back()">Go Back</button>
            <button class="btn btn-primary" type="button" onclick="window.location.href='portfolio.html'">View Portfolio</button>
        </div>
    </main>

    <script>
        window.addEventListener("load", function () {
            const loader = document.querySelector(".loader");

            setTimeout(() => {
                loader.classList.add("loader-hidden");
            }, 900);

            setTimeout(() => {
                loader.style.display = "none";
            }, 1400);
        });

        const greet = document.querySelector(".greet h2");
        const now = new Date();
        const hours = now.getHours();

        if (hours >= 5 && hours < 12) {
            greet.textContent = "Good Morning";
        } else if (hours >= 12 && hours < 17) {
            greet.textContent = "Good Afternoon";
        } else if (hours >= 17 && hours < 21) {
            greet.textContent = "Good Evening";
        } else {
            greet.textContent = "Good Night";
        }
    </script>
</body>

</html>
